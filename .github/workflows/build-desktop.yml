name: Build desktop installers

# Build the Khoros desktop app on macOS, Windows, and Linux at once.
# QVAC's native addons are per-OS and can't cross-compile, so each installer must
# be built on its own OS — that's exactly what this matrix does.
#
# Release stays fresh AUTOMATICALLY: any push to main that touches app code
# (and any manual dispatch) rebuilds all three installers and replaces the
# assets on the rolling release, so the landing's download buttons always
# serve the newest build. Tag pushes still create their own new Release.
on:
  workflow_dispatch: # manual "Run workflow" button in the Actions tab
    inputs:
      release_tag:
        description: "Existing release to refresh with these builds"
        default: "v0.1.0"
        required: true
  push:
    branches:
      - main
    tags:
      - "v*" # a new tag (v0.2.0…) builds + attaches to its own new Release
    paths: # branch pushes: only app code (paths are ignored for tag pushes)
      - "desktop/**"
      - "agent/**"
      - "tools/**"
      - "net/**"
      - ".github/workflows/build-desktop.yml"

permissions:
  contents: write # publish Releases + replace release assets

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one OS failing shouldn't cancel the others
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # QVAC SDK needs Node >= 22.17
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # maker-deb (Linux .deb) needs fakeroot + dpkg
      - name: Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Make installer
        run: npm run make

      # Keep the built installers as a downloadable artifact on every run
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: khoros-${{ matrix.os }}
          path: |
            desktop/out/make/**/*.dmg
            desktop/out/make/**/*.exe
            desktop/out/make/**/*.deb
            desktop/out/make/**/*.zip
          if-no-files-found: warn

      # Keep the rolling release fresh: main pushes + manual dispatches replace
      # the assets in place, so the landing's download links always serve the
      # newest build. --clobber overwrites same-named assets.
      - name: Refresh rolling release assets
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag || 'v0.1.0' }}
        run: |
          shopt -s globstar nullglob
          files=(out/make/**/*.dmg out/make/**/*.exe out/make/**/*.deb out/make/**/*.zip)
          echo "uploading ${#files[@]} asset(s) to $TAG: ${files[*]}"
          gh release upload "$TAG" "${files[@]}" --clobber -R "$GITHUB_REPOSITORY"

      # On a tag push (v*), attach the installers to that tag's own Release
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/out/make/**/*.dmg
            desktop/out/make/**/*.exe
            desktop/out/make/**/*.deb
            desktop/out/make/**/*.zip

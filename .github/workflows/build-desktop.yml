name: Build desktop installers

# Build the Khoros desktop app on macOS, Windows, and Linux at once.
# QVAC's native addons are per-OS and can't cross-compile, so each installer must
# be built on its own OS — that's exactly what this matrix does.
on:
  workflow_dispatch: # manual "Run workflow" button in the Actions tab
  push:
    tags:
      - "v*" # pushing a tag like v0.1.0 also builds + attaches to a Release

permissions:
  contents: write # needed to publish a Release on tag pushes

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one OS failing shouldn't cancel the others
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # QVAC SDK needs Node >= 22.17
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # maker-deb (Linux .deb) needs fakeroot + dpkg
      - name: Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Make installer
        run: npm run make

      # Keep the built installers as a downloadable artifact on every run
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: khoros-${{ matrix.os }}
          path: |
            desktop/out/make/**/*.dmg
            desktop/out/make/**/*.exe
            desktop/out/make/**/*.deb
            desktop/out/make/**/*.zip
          if-no-files-found: warn

      # On a tag push (v*), also attach the installers to a GitHub Release
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/out/make/**/*.dmg
            desktop/out/make/**/*.exe
            desktop/out/make/**/*.deb
            desktop/out/make/**/*.zip
